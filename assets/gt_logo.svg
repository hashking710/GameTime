<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
    ]]></style>

    <!-- Background: deep navy radial -->
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#1a2e52"/>
      <stop offset="55%"  stop-color="#0d1828"/>
      <stop offset="100%" stop-color="#060911"/>
    </radialGradient>

    <!-- Subtle sphere-highlight -->
    <radialGradient id="hl" cx="37%" cy="30%" r="52%">
      <stop offset="0%"   stop-color="#4a6fa0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000"     stop-opacity="0"/>
    </radialGradient>

    <!-- Main accent: cyan → purple → orange -->
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00e5ff"/>
      <stop offset="50%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>

    <!-- GT text gradient (userSpaceOnUse so G=blue, T=orange) -->
    <linearGradient id="gt" x1="110" y1="0" x2="395" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4fc3f7"/>
      <stop offset="44%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>

    <!-- Neon glow (arc + endpoint dots) -->
    <filter id="fn" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="a"/>
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="a"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="ft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow (ticks / icons) -->
    <filter id="fs" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to circle -->
    <clipPath id="cp">
      <circle cx="250" cy="250" r="232"/>
    </clipPath>
  </defs>

  <!-- ══ BACKGROUND ══ -->
  <circle cx="250" cy="250" r="232" fill="url(#bg)"/>
  <circle cx="250" cy="250" r="232" fill="url(#hl)"/>

  <!-- ══ ARC GLOW HALO ══ -->
  <path d="M 250 52 A 198 198 0 1 1 52 250"
        fill="none" stroke="#8b5cf6" stroke-width="24"
        stroke-linecap="round" opacity="0.14" clip-path="url(#cp)"/>

  <!-- ══ PROGRESS ARC — 270° clockwise (12 o'clock → 9 o'clock) ══ -->
  <!-- Start: 270° → (250, 52)   End: 180° → (52, 250)   large-arc=1  sweep=1 -->
  <path d="M 250 52 A 198 198 0 1 1 52 250"
        fill="none" stroke="url(#acc)" stroke-width="7"
        stroke-linecap="round" filter="url(#fn)" opacity="0.92" clip-path="url(#cp)"/>

  <!-- Thin inner echo arc -->
  <path d="M 250 73 A 177 177 0 1 1 73 250"
        fill="none" stroke="url(#acc)" stroke-width="1"
        stroke-linecap="round" opacity="0.22"/>

  <!-- ══ CLOCK TICK MARKS  (r_inner=218, r_outer=231, cx=250, cy=250) ══ -->
  <!-- 12 o'clock  [270°] -->
  <line x1="250"   y1="32"    x2="250"   y2="19"    stroke="#00e5ff" stroke-width="3.5" stroke-linecap="round" filter="url(#fs)"/>
  <!-- 1 o'clock   [300°] cos=0.5  sin=−0.866 -->
  <line x1="359"   y1="61.2"  x2="365.5" y2="50.1"  stroke="#a78bfa" stroke-width="2"   stroke-linecap="round" opacity="0.70"/>
  <!-- 2 o'clock   [330°] cos=0.866 sin=−0.5 -->
  <line x1="438.8" y1="141"   x2="450.1" y2="134.5" stroke="#a78bfa" stroke-width="2"   stroke-linecap="round" opacity="0.70"/>
  <!-- 3 o'clock   [0°] -->
  <line x1="468"   y1="250"   x2="481"   y2="250"   stroke="#00e5ff" stroke-width="3.5" stroke-linecap="round" filter="url(#fs)"/>
  <!-- 4 o'clock   [30°] cos=0.866 sin=0.5 -->
  <line x1="438.8" y1="359"   x2="450.1" y2="365.5" stroke="#a78bfa" stroke-width="2"   stroke-linecap="round" opacity="0.70"/>
  <!-- 5 o'clock   [60°] cos=0.5  sin=0.866 -->
  <line x1="359"   y1="438.8" x2="365.5" y2="449.9" stroke="#a78bfa" stroke-width="2"   stroke-linecap="round" opacity="0.70"/>
  <!-- 6 o'clock   [90°] -->
  <line x1="250"   y1="468"   x2="250"   y2="481"   stroke="#f97316" stroke-width="3.5" stroke-linecap="round" filter="url(#fs)"/>
  <!-- 7 o'clock   [120°] cos=−0.5 sin=0.866 -->
  <line x1="141"   y1="438.8" x2="134.5" y2="449.9" stroke="#a78bfa" stroke-width="2"   stroke-linecap="round" opacity="0.70"/>
  <!-- 8 o'clock   [150°] cos=−0.866 sin=0.5 -->
  <line x1="61.2"  y1="359"   x2="49.9"  y2="365.5" stroke="#a78bfa" stroke-width="2"   stroke-linecap="round" opacity="0.70"/>
  <!-- 9 o'clock   [180°] -->
  <line x1="32"    y1="250"   x2="19"    y2="250"   stroke="#f97316" stroke-width="3.5" stroke-linecap="round" filter="url(#fs)"/>
  <!-- 10 o'clock [210°] and 11 o'clock [240°] fall inside the arc gap — intentionally omitted -->

  <!-- ══ GAP DOTS — subtle "pending" indicator in the open arc section ══ -->
  <!-- at r=198: 210°→(78.5,151)  225°→(110,110)  240°→(151,78.5) -->
  <circle cx="78.5" cy="151"  r="4" fill="#8b5cf6" opacity="0.32"/>
  <circle cx="110"  cy="110"  r="4" fill="#8b5cf6" opacity="0.32"/>
  <circle cx="151"  cy="78.5" r="4" fill="#8b5cf6" opacity="0.32"/>

  <!-- ══ ARC ENDPOINT GLOWING DOTS ══ -->
  <circle cx="250" cy="52"  r="8" fill="#00e5ff" filter="url(#fn)"/>
  <circle cx="52"  cy="250" r="8" fill="#f97316" filter="url(#fn)"/>

  <!-- ══ GT MONOGRAM ══ -->
  <!-- Drop-shadow layer -->
  <text x="254" y="324"
        text-anchor="middle"
        font-family="'Orbitron', 'Arial Black', Impact, sans-serif"
        font-size="200" font-weight="900"
        fill="#000000" opacity="0.38"
        clip-path="url(#cp)">GT</text>
  <!-- Main gradient text -->
  <text x="250" y="320"
        text-anchor="middle"
        font-family="'Orbitron', 'Arial Black', Impact, sans-serif"
        font-size="200" font-weight="900"
        fill="url(#gt)" filter="url(#ft)"
        clip-path="url(#cp)">GT</text>

  <!-- ══ PIXEL SQUARES — upper-right, esports reference ══ -->
  <rect x="370" y="90"  width="13" height="13" rx="2" fill="#00e5ff" opacity="0.78"/>
  <rect x="387" y="90"  width="13" height="13" rx="2" fill="#8b5cf6" opacity="0.78"/>
  <rect x="370" y="107" width="13" height="13" rx="2" fill="#8b5cf6" opacity="0.78"/>
  <rect x="387" y="107" width="13" height="13" rx="2" fill="#f97316" opacity="0.78"/>

  <!-- ══ D-PAD + BUTTONS — upper-left, controller reference ══ -->
  <!-- D-pad cross -->
  <rect x="123" y="108" width="8"  height="22" rx="2" fill="#4fc3f7" opacity="0.72"/>
  <rect x="115" y="116" width="24" height="8"  rx="2" fill="#4fc3f7" opacity="0.72"/>
  <!-- Two action buttons -->
  <circle cx="156" cy="115" r="5" fill="#a78bfa" opacity="0.72"/>
  <circle cx="156" cy="130" r="5" fill="#fb923c" opacity="0.72"/>

  <!-- ══ SPORTS BALL — lower-left, sports reference ══ -->
  <circle cx="113" cy="387" r="17" fill="none" stroke="#fb923c" stroke-width="2.5" opacity="0.65"/>
  <!-- Panel lines -->
  <path d="M 102 380 Q 113 371 124 380" fill="none" stroke="#fb923c" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
  <path d="M 100 392 Q 113 403 126 392" fill="none" stroke="#fb923c" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
  <line x1="113" y1="370" x2="113" y2="404" stroke="#fb923c" stroke-width="1.4" stroke-linecap="round" opacity="0.40"/>

  <!-- ══ OUTER RING ══ -->
  <circle cx="250" cy="250" r="232" fill="none" stroke="url(#acc)" stroke-width="2.5" opacity="0.72"/>
</svg>
